version: 2
updates:
  # GitHub Actions — chore prefix, no release triggered
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore: "

  - package-ecosystem: "docker"
    # Look for a `Dockerfile` in the `root` directory
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix: "

  # All npm dependencies (root workspace covers backend + frontend) — fix prefix, triggers patch release
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix: "

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore: "

  # Python collector dependencies — fix prefix, triggers patch release
  - package-ecosystem: "uv"
    directory: "/collector"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix: "
